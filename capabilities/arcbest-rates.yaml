naftiko: 1.0.0-alpha2
info:
  label: ArcBest API — Rates
  description: 'ArcBest API — Rates. 1 operations. Lead operation: ArcBest Get LTL Rate Quote. Self-contained Naftiko capability
    covering one Arcbest business surface.'
  tags:
  - Arcbest
  - Rates
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ARCBEST_API_KEY: ARCBEST_API_KEY
capability:
  consumes:
  - type: http
    namespace: arcbest-rates
    baseUri: https://api.arcbest.com/v2
    description: ArcBest API — Rates business capability. Self-contained, no shared references.
    resources:
    - name: rates-ltl
      path: /rates/ltl
      operations:
      - name: getltlrate
        method: POST
        description: ArcBest Get LTL Rate Quote
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ARCBEST_API_KEY}}'
  exposes:
  - type: rest
    namespace: arcbest-rates-rest
    port: 8080
    description: REST adapter for ArcBest API — Rates. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/rates/ltl
      name: rates-ltl
      description: REST surface for rates-ltl.
      operations:
      - method: POST
        name: getltlrate
        description: ArcBest Get LTL Rate Quote
        call: arcbest-rates.getltlrate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: arcbest-rates-mcp
    port: 9090
    transport: http
    description: MCP adapter for ArcBest API — Rates. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: arcbest-get-ltl-rate-quote
      description: ArcBest Get LTL Rate Quote
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: arcbest-rates.getltlrate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
