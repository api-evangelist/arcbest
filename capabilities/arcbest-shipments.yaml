naftiko: 1.0.0-alpha2
info:
  label: ArcBest API — Shipments
  description: 'ArcBest API — Shipments. 2 operations. Lead operation: ArcBest Create Shipment. Self-contained Naftiko capability
    covering one Arcbest business surface.'
  tags:
  - Arcbest
  - Shipments
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ARCBEST_API_KEY: ARCBEST_API_KEY
capability:
  consumes:
  - type: http
    namespace: arcbest-shipments
    baseUri: https://api.arcbest.com/v2
    description: ArcBest API — Shipments business capability. Self-contained, no shared references.
    resources:
    - name: shipments
      path: /shipments
      operations:
      - name: createshipment
        method: POST
        description: ArcBest Create Shipment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: listshipments
        method: GET
        description: ArcBest List Shipments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: startDate
          in: query
          type: string
          description: Start date filter (YYYY-MM-DD)
        - name: endDate
          in: query
          type: string
          description: End date filter (YYYY-MM-DD)
        - name: status
          in: query
          type: string
          description: Filter by shipment status
    authentication:
      type: bearer
      token: '{{env.ARCBEST_API_KEY}}'
  exposes:
  - type: rest
    namespace: arcbest-shipments-rest
    port: 8080
    description: REST adapter for ArcBest API — Shipments. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/shipments
      name: shipments
      description: REST surface for shipments.
      operations:
      - method: POST
        name: createshipment
        description: ArcBest Create Shipment
        call: arcbest-shipments.createshipment
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: listshipments
        description: ArcBest List Shipments
        call: arcbest-shipments.listshipments
        with:
          startDate: rest.startDate
          endDate: rest.endDate
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: arcbest-shipments-mcp
    port: 9090
    transport: http
    description: MCP adapter for ArcBest API — Shipments. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: arcbest-create-shipment
      description: ArcBest Create Shipment
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: arcbest-shipments.createshipment
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: arcbest-list-shipments
      description: ArcBest List Shipments
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: arcbest-shipments.listshipments
      with:
        startDate: tools.startDate
        endDate: tools.endDate
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
